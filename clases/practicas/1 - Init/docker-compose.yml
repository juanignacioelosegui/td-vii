services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: td7_postgres_db
    ports:
      - 5432:5432
    volumes:
      - postgres_volume:/var/lib/postgresql/data
      - ./inputData/:/data/
    environment:
      - POSTGRES_DB=td7_postgres
      - POSTGRES_USER=td7_postgres
      - POSTGRES_PASSWORD=td7_secretpassword
volumes:
    postgres_volume:
        external: false